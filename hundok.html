  { kanji:"明らか",reading:"あきらか",meaning:"명백하다",level:"N3",type:"な형" },
  { kanji:"意外",reading:"いがい",meaning:"의외이다",level:"N3",type:"な형" },
  { kanji:"上品",reading:"じょうひん",meaning:"우아하다",level:"N3",type:"な형" },
  { kanji:"下品",reading:"げひん",meaning:"저속하다",level:"N3",type:"な형" },
  { kanji:"確か",reading:"たしか",meaning:"확실하다",level:"N3",type:"な형" },
  { kanji:"大げさ",reading:"おおげさ",meaning:"과장되다",level:"N3",type:"な형" },
  { kanji:"穏やか",reading:"おだやか",meaning:"온화하다",level:"N3",type:"な형" },
  { kanji:"活発",reading:"かっぱつ",meaning:"활발하다",level:"N3",type:"な형" },
  { kanji:"勝手",reading:"かって",meaning:"제멋대로다",level:"N3",type:"な형" },
  { kanji:"さまざま",reading:"さまざま",meaning:"다양하다",level:"N3",type:"な형" },
  { kanji:"盛ん",reading:"さかん",meaning:"활발하다/왕성하다",level:"N3",type:"な형" },
  { kanji:"重大",reading:"じゅうだい",meaning:"중대하다",level:"N3",type:"な형" },
  { kanji:"正確",reading:"せいかく",meaning:"정확하다",level:"N3",type:"な형" },
  { kanji:"素敵",reading:"すてき",meaning:"멋지다",level:"N3",type:"な형" },
  { kanji:"適切",reading:"てきせつ",meaning:"적절하다",level:"N3",type:"な형" },
  { kanji:"当然",reading:"とうぜん",meaning:"당연하다",level:"N3",type:"な형" },
  { kanji:"平和",reading:"へいわ",meaning:"평화롭다",level:"N3",type:"な형" },
  { kanji:"豊か",reading:"ゆたか",meaning:"풍요롭다",level:"N3",type:"な형" },
  { kanji:"余裕",reading:"よゆう",meaning:"여유롭다",level:"N3",type:"な형" },
  { kanji:"楽",reading:"らく",meaning:"편하다/즐겁다",level:"N3",type:"な형" },
  { kanji:"わがまま",reading:"わがまま",meaning:"제멋대로다",level:"N3",type:"な형" },
  { kanji:"熱心",reading:"ねっしん",meaning:"열심이다",level:"N3",type:"な형" },
  { kanji:"不安",reading:"ふあん",meaning:"불안하다",level:"N3",type:"な형" },
  { kanji:"細かい",reading:"こまかい",meaning:"세세하다/잘다",level:"N3",type:"な형" },
  { kanji:"強引",reading:"ごういん",meaning:"강압적이다",level:"N3",type:"な형" },
];

const LEVELS = ["전체","N5","N4","N3"];
const TYPES = ["전체","동사","い형","な형"];
const TYPE_COLOR = { 동사:"#3b82f6", "い형":"#10b981", "な형":"#f59e0b" };
const LEVEL_COLOR = { N5:"#6366f1", N4:"#ec4899", N3:"#ef4444" };

function Badge({ label, color }) {
  return (
    <span style={{
      background: color + "22", color, border: `1px solid ${color}44`,
      borderRadius:6, padding:"2px 8px", fontSize:11, fontWeight:700,
      letterSpacing:"0.03em", whiteSpace:"nowrap",
    }}>{label}</span>
  );
}

function FlashCard({ word, onNext, total, current }) {
  const [flipped, setFlipped] = useState(false);
  return (
    <div style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:24 }}>
      <div style={{ color:"#64748b", fontSize:13 }}>{current + 1} / {total}</div>
      <div onClick={() => setFlipped(f => !f)} style={{
        width:"min(360px, 88vw)", minHeight:200, borderRadius:20,
        background: flipped ? "#1e293b" : "#f8fafc",
        border: `2px solid ${flipped ? "#334155" : "#e2e8f0"}`,
        display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center",
        cursor:"pointer", transition:"all 0.2s", padding:32, gap:16, boxSizing:"border-box",
        boxShadow:"0 4px 24px #0001",
      }}>
        {!flipped ? (
          <>
            <div style={{ fontSize:52, fontWeight:800, color:"#0f172a", letterSpacing:"-2px" }}>{word.kanji}</div>
            <div style={{ fontSize:13, color:"#94a3b8" }}>탭해서 뒤집기 👆</div>
          </>
        ) : (
          <>
            <div style={{ fontSize:30, color:"#94a3b8", letterSpacing:"0.1em" }}>{word.reading}</div>
            <div style={{ fontSize:20, color:"#f1f5f9", fontWeight:700 }}>{word.meaning}</div>
            <div style={{ display:"flex", gap:8, marginTop:4 }}>
              <Badge label={word.level} color={LEVEL_COLOR[word.level]} />
              <Badge label={word.type} color={TYPE_COLOR[word.type]} />
            </div>
          </>
        )}
      </div>
      <button onClick={() => { setFlipped(false); onNext(); }} style={{
        padding:"10px 32px", borderRadius:12, border:"none",
        background:"#3b82f6", color:"#fff", fontWeight:700, fontSize:15, cursor:"pointer",
      }}>다음 →</button>
    </div>
  );
}

function App() {
  const [levels, setLevels] = useState(new Set());
  const [type, setType] = useState("전체");
  const [search, setSearch] = useState("");
  const [mode, setMode] = useState("list");
  const [flashIdx, setFlashIdx] = useState(0);
  const [flashWords, setFlashWords] = useState([]);

  const toggleLevel = (l) => {
    if (l === "전체") { setLevels(new Set()); return; }
    setLevels(prev => {
      const next = new Set(prev);
      next.has(l) ? next.delete(l) : next.add(l);
      return next;
    });
  };

  const filtered = useMemo(() => {
    let d = vocabData;
    if (levels.size > 0) d = d.filter(w => levels.has(w.level));
    if (type !== "전체") d = d.filter(w => w.type === type);
    if (search.trim()) {
      const q = search.trim().toLowerCase();
      d = d.filter(w => w.kanji.includes(q) || w.reading.includes(q) || w.meaning.includes(q));
    }
    return d;
  }, [levels, type, search]);

  const counts = useMemo(() => {
    const c = { N5:0, N4:0, N3:0, 동사:0, "い형":0, "な형":0 };
    filtered.forEach(w => { c[w.level]++; c[w.type]++; });
    return c;
  }, [filtered]);

  const modeRef = useRef(mode);
  useEffect(() => { modeRef.current = mode; }, [mode]);

  const startFlash = () => {
    const arr = [...filtered].sort(() => Math.random() - 0.5);
    setFlashWords(arr);
    setFlashIdx(0);
    setMode("flash");
  };

  useEffect(() => {
    if (modeRef.current === "flash") {
      const arr = [...filtered].sort(() => Math.random() - 0.5);
      setFlashWords(arr);
      setFlashIdx(0);
    }
  }, [filtered]);

  const currentWord = flashWords[flashIdx % Math.max(flashWords.length, 1)];

  return (
    <div style={{ minHeight:"100vh", background:"#f1f5f9", fontFamily:"'Noto Sans KR','Noto Sans JP',sans-serif", paddingBottom:48 }}>
      {/* Header */}
      <div style={{ background:"linear-gradient(135deg,#1e293b 0%,#0f172a 100%)", padding:"28px 20px 24px", color:"#fff" }}>
        <div style={{ maxWidth:720, margin:"0 auto" }}>
          <div style={{ fontSize:11, letterSpacing:"0.2em", color:"#64748b", marginBottom:6 }}>JLPT 단어장</div>
          <div style={{ fontSize:22, fontWeight:800, color:"#f1f5f9" }}>N5~N3 훈독 완전 정복 📖</div>
          <div style={{ fontSize:13, color:"#94a3b8", marginTop:6 }}>총 {vocabData.length}개 · 동사 / い형용사 / な형용사</div>
        </div>
      </div>

      <div style={{ maxWidth:720, margin:"0 auto", padding:"20px 16px 0" }}>
        {/* Mode Buttons */}
        <div style={{ display:"flex", gap:8, marginBottom:16 }}>
          <button onClick={() => setMode("list")} style={{
            padding:"8px 20px", borderRadius:10, border:"none", fontWeight:700, fontSize:13, cursor:"pointer",
            background: mode==="list" ? "#1e293b" : "#e2e8f0", color: mode==="list" ? "#fff" : "#475569",
          }}>📋 목록 보기</button>
          <button onClick={startFlash} style={{
            padding:"8px 20px", borderRadius:10, border:"none", fontWeight:700, fontSize:13, cursor:"pointer",
            background: mode==="flash" ? "#1e293b" : "#e2e8f0", color: mode==="flash" ? "#fff" : "#475569",
          }}>🃏 플래시카드</button>
        </div>

        {/* Filters */}
        <div style={{ background:"#fff", borderRadius:16, padding:16, marginBottom:16, boxShadow:"0 1px 8px #0001" }}>
          <input value={search} onChange={e => setSearch(e.target.value)}
            placeholder="한자·읽기·뜻 검색..." style={{
              width:"100%", padding:"10px 14px", borderRadius:10, border:"1.5px solid #e2e8f0",
              fontSize:14, outline:"none", boxSizing:"border-box", marginBottom:12, fontFamily:"inherit",
            }} />
          <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginBottom:8 }}>
            {LEVELS.map(l => {
              const isAll = l === "전체";
              const active = isAll ? levels.size === 0 : levels.has(l);
              return (
                <button key={l} onClick={() => toggleLevel(l)} style={{
                  padding:"5px 14px", borderRadius:8, border:"none", fontWeight:700, fontSize:12, cursor:"pointer",
                  background: active ? (isAll ? "#1e293b" : LEVEL_COLOR[l]) : "#f1f5f9",
                  color: active ? "#fff" : "#64748b",
                }}>{l}</button>
              );
            })}
          </div>
          <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
            {TYPES.map(t => (
              <button key={t} onClick={() => setType(t)} style={{
                padding:"5px 14px", borderRadius:8, border:"none", fontWeight:700, fontSize:12, cursor:"pointer",
                background: type===t ? (t==="전체" ? "#1e293b" : TYPE_COLOR[t]) : "#f1f5f9",
                color: type===t ? "#fff" : "#64748b",
              }}>{t}</button>
            ))}
          </div>
        </div>

        {/* Stats */}
        <div style={{ display:"flex", gap:8, flexWrap:"wrap", marginBottom:16 }}>
          {[
            { label:"표시", val:filtered.length, color:"#1e293b" },
            { label:"N5", val:counts.N5, color:LEVEL_COLOR.N5 },
            { label:"N4", val:counts.N4, color:LEVEL_COLOR.N4 },
            { label:"N3", val:counts.N3, color:LEVEL_COLOR.N3 },
            { label:"동사", val:counts.동사, color:TYPE_COLOR.동사 },
            { label:"い형", val:counts["い형"], color:TYPE_COLOR["い형"] },
            { label:"な형", val:counts["な형"], color:TYPE_COLOR["な형"] },
          ].map(s => (
            <div key={s.label} style={{
              background:s.color+"11", border:`1px solid ${s.color}33`,
              borderRadius:8, padding:"4px 12px", fontSize:12, color:s.color, fontWeight:700,
            }}>{s.label} <strong>{s.val}</strong></div>
          ))}
        </div>

        {/* Content */}
        {mode === "flash" ? (
          flashWords.length > 0 ? (
            <div style={{ background:"#fff", borderRadius:20, padding:"32px 20px",
              boxShadow:"0 1px 8px #0001", display:"flex", flexDirection:"column", alignItems:"center" }}>
              <FlashCard word={currentWord} total={flashWords.length}
                current={flashIdx % flashWords.length} onNext={() => setFlashIdx(i => i+1)} />
            </div>
          ) : (
            <div style={{ textAlign:"center", color:"#94a3b8", padding:48 }}>검색 결과가 없습니다</div>
          )
        ) : (
          <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
            {filtered.length === 0 && <div style={{ textAlign:"center", color:"#94a3b8", padding:48 }}>검색 결과가 없습니다</div>}
            {filtered.map((w, i) => (
              <div key={i} style={{
                background:"#fff", borderRadius:14, padding:"14px 16px",
                boxShadow:"0 1px 4px #0001", display:"flex", alignItems:"center", gap:12,
              }}>
                <div style={{ fontSize:28, fontWeight:800, color:"#0f172a", minWidth:80, letterSpacing:"-1px", lineHeight:1 }}>
                  {w.kanji}
                </div>
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:15, color:"#475569", letterSpacing:"0.05em", marginBottom:2 }}>{w.reading}</div>
                  <div style={{ fontSize:14, color:"#0f172a", fontWeight:600 }}>{w.meaning}</div>
                </div>
                <div style={{ display:"flex", flexDirection:"column", gap:4, alignItems:"flex-end" }}>
                  <Badge label={w.level} color={LEVEL_COLOR[w.level]} />
                  <Badge label={w.type} color={TYPE_COLOR[w.type]} />
                </div>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
